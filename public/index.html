<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payslip System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .action-column { width: 170px; }
    .actions-row { white-space: nowrap; }
    .compact-action-btn { padding: 0.35rem 0.5rem; font-size: 0.72rem; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto py-12 px-4 sm:px-6">
    <h1 class="text-4xl font-bold text-gray-900 mb-8">Payslip System</h1>
    
    <section class="bg-white rounded-lg shadow-md p-6 mb-8">
      <h2 class="text-2xl font-semibold text-gray-800 mb-4">Import Excel</h2>
      <form id="uploadForm" class="space-y-4">
        <div>
          <label for="fileInput" class="block text-sm font-medium text-gray-700 mb-2">
            Choose Excel File
          </label>
          <input 
            type="file" 
            name="file" 
            id="fileInput" 
            accept=".xlsx,.xls" 
            required
            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700"
          />
        </div>
        <div class="flex flex-wrap gap-3">
          <button 
            type="submit"
            class="px-6 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 transition-colors"
          >
            Upload
          </button>
          <a
            href="/sample-import-template.csv"
            class="px-6 py-2 bg-green-600 text-white font-medium rounded-md hover:bg-green-700 transition-colors"
          >
            Download import template
          </a>
        </div>
      </form>
      <p class="mt-3 text-sm text-gray-500">Download the payslip import template and use its column names as the headers in your Excel file.</p>
      <div id="uploadResult" class="mt-4 p-3 bg-gray-100 rounded text-sm text-gray-700 hidden"></div>
    </section>

    <section class="bg-white rounded-lg shadow-md p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-semibold text-gray-800">Employees</h2>
        <div class="flex gap-2">
          <button 
            id="generateAllBtn"
            class="px-4 py-2 bg-green-600 text-white font-medium rounded-md hover:bg-green-700 transition-colors"
          >
            Generate All Payslips
          </button>
          <button 
            id="sendAllBtn"
            class="px-4 py-2 bg-orange-600 text-white font-medium rounded-md hover:bg-orange-700 transition-colors"
          >
            Send All Emails
          </button>
          <button 
            id="refreshBtn"
            class="px-4 py-2 bg-gray-600 text-white font-medium rounded-md hover:bg-gray-700 transition-colors"
          >
            Refresh
          </button>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table id="employeesTable" class="w-full border-collapse">
          <thead>
            <tr class="bg-gray-200">
              <th class="border border-gray-300 px-4 py-2 text-left text-sm font-semibold text-gray-700">ID</th>
              <th class="border border-gray-300 px-4 py-2 text-left text-sm font-semibold text-gray-700">Employee ID</th>
              <th class="border border-gray-300 px-4 py-2 text-left text-sm font-semibold text-gray-700">Name</th>
              <th class="border border-gray-300 px-4 py-2 text-left text-sm font-semibold text-gray-700">Position</th>
              <th class="border border-gray-300 px-4 py-2 text-left text-sm font-semibold text-gray-700">Email</th>
              <th class="border border-gray-300 px-4 py-2 text-left text-sm font-semibold text-gray-700">Basic Salary</th>
              <th class="border border-gray-300 px-4 py-2 text-left text-sm font-semibold text-gray-700 action-column">Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

  </div>

  <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold text-gray-800">Edit Email</h3>
        <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700 text-xl">×</button>
      </div>
      <form id="editEmailForm" class="space-y-4">
        <input type="hidden" id="editEmployeeId" />
        <div>
          <label for="editEmailInput" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
          <input id="editEmailInput" type="email" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div class="flex justify-end gap-2">
          <button type="button" id="cancelModalBtn" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Send Again</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
